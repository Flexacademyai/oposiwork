name: CI/CD Oposiwork

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  FLUTTER_VERSION: '3.32.0'

jobs:
  # ─────────────────────────────────────────────
  # Flutter: análisis estático + tests
  # ─────────────────────────────────────────────
  flutter-check:
    name: Flutter — análisis y tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Verificar formato de código
        run: dart format --set-exit-if-changed lib/

      - name: Análisis estático
        run: flutter analyze --no-fatal-infos

      - name: Ejecutar tests
        run: flutter test --coverage

  # ─────────────────────────────────────────────
  # Comprobar qué secrets están configurados
  # (el contexto `secrets` no está disponible en if de job,
  #  así que un job auxiliar expone flags como outputs)
  # ─────────────────────────────────────────────
  check-secrets:
    name: Comprobar secrets
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    outputs:
      build: ${{ steps.chk.outputs.build }}
      supabase: ${{ steps.chk.outputs.supabase }}
      vercel: ${{ steps.chk.outputs.vercel }}
    steps:
      - id: chk
        run: |
          echo "build=${{ secrets.SUPABASE_URL != '' }}" >> "$GITHUB_OUTPUT"
          echo "supabase=${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
          echo "vercel=${{ secrets.VERCEL_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # Flutter Web: build + preparar estructura SEO
  # ─────────────────────────────────────────────
  flutter-web-build:
    name: Flutter Web — build
    runs-on: ubuntu-latest
    needs: [flutter-check, check-secrets]
    # Se salta (sin fallar) mientras no haya secrets de build en GitHub
    if: needs.check-secrets.outputs.build == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web --release --base-href /app/ \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=REVENUECAT_API_KEY_IOS=${{ secrets.REVENUECAT_API_KEY_IOS }} \
            --dart-define=REVENUECAT_API_KEY_ANDROID=${{ secrets.REVENUECAT_API_KEY_ANDROID }} \
            --dart-define=CAPTCHA_PROVIDER=${{ secrets.CAPTCHA_PROVIDER }} \
            --dart-define=CAPTCHA_SITE_KEY=${{ secrets.CAPTCHA_SITE_KEY }}

      - name: Preparar estructura de despliegue
        run: |
          mkdir -p build/seo/app
          # Flutter web va en /app/
          cp -r build/web/* build/seo/app/
          # Eliminar archivos extra del build copiados desde web/ que no pertenecen a /app/
          rm -rf build/seo/app/landing build/seo/app/api build/seo/app/vercel.json build/seo/app/.vercel build/seo/app/.gitignore build/seo/app/robots.txt build/seo/app/sitemap.xml
          # Landing page en la raíz
          cp -r web/landing/. build/seo/
          # Recursos compartidos en la raíz
          cp build/web/icons build/seo/icons -r
          cp build/web/favicon.png build/seo/favicon.png
          cp build/web/manifest.json build/seo/manifest.json
          # API (Vercel Serverless Functions)
          cp -r api build/seo/api
          # vercel.json raíz
          cp vercel.json build/seo/vercel.json

      - name: Subir artefacto web
        uses: actions/upload-artifact@v4
        with:
          name: seo-deploy
          path: build/seo/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Supabase Edge Functions: deploy
  # ─────────────────────────────────────────────
  supabase-deploy:
    name: Supabase — funciones y migraciones
    runs-on: ubuntu-latest
    needs: [flutter-check, check-secrets]
    # Se salta (sin fallar) mientras no haya secrets de Supabase en GitHub
    if: needs.check-secrets.outputs.supabase == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Las migraciones se aplican vía Management API en desarrollo; este paso
      # solo actúa si algún día se configura SUPABASE_DB_PASSWORD en GitHub.
      # (El contexto `secrets` no se permite en `if`, por eso se comprueba en shell.)
      - name: Aplicar migraciones
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "SUPABASE_DB_PASSWORD no configurado: migraciones omitidas (se aplican vía API)."
            exit 0
          fi
          supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # OJO: monitor-boe, send-notifications y verify-subscription usan
      # autenticación propia (cron secret / firma) — desplegar SIN verify_jwt
      # o el gateway bloquearía el cron y los webhooks.
      - name: Deploy Edge Functions
        run: |
          supabase functions deploy download-pdf --use-api --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy verify-subscription --use-api --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy chat-rag --use-api --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy monitor-boe --use-api --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy crear-sesion-voz --use-api --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy send-notifications --use-api --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ─────────────────────────────────────────────
  # Vercel: deploy web
  # ─────────────────────────────────────────────
  vercel-deploy:
    name: Vercel — deploy web
    runs-on: ubuntu-latest
    needs: [flutter-web-build, check-secrets]
    # Se salta (sin fallar) mientras no haya secrets de Vercel en GitHub
    if: needs.check-secrets.outputs.vercel == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Descargar artefacto web
        uses: actions/download-artifact@v4
        with:
          name: seo-deploy
          path: build/seo

      # Patrón oficial de Vercel para CI: el CLI se vincula solo con
      # VERCEL_ORG_ID + VERCEL_PROJECT_ID en el entorno.
      - name: Deploy a Vercel
        working-directory: build/seo
        run: |
          npm install -g vercel@latest
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
